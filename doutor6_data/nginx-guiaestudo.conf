# ═══════════════════════════════════════════════════════════════
# Nginx — Integração Guia Estudo + Doutor 6.0
# Adicionar ao /etc/nginx/sites-enabled/gericfast (ou criar separado)
# ═══════════════════════════════════════════════════════════════

# Guia Estudo (Moneybroken) — Portal Educacional
location /guiadeestudo {
    proxy_pass http://127.0.0.1:9001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

# Guia Estudo — Doutor API (gera conteúdo educativo)
location /guiadeestudo/api/doutor/ {
    proxy_pass http://127.0.0.1:8765/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

# Guia Estudo — Hermes AI Tutor
location /guiadeestudo/api/hermes/ {
    proxy_pass http://127.0.0.1:8642/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 120s;
}
